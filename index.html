<html lang="zh-CN"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>邓栩+宋岑娣 案 · 登录</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#0f172a;color:#e2e8f0;line-height:1.6;min-height:100vh}
#login-screen{position:fixed;inset:0;background:linear-gradient(135deg,#1e293b 0%,#0f172a 100%);display:flex;align-items:center;justify-content:center;z-index:9999}
.login-box{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:40px 48px;max-width:420px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.5)}
.lock-icon{width:64px;height:64px;background:#dc2626;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:30px}
.login-box h1{color:#f8fafc;font-size:22px;font-weight:700;text-align:center;margin-bottom:8px}
.login-box .subtitle{color:#94a3b8;font-size:13px;text-align:center;margin-bottom:32px;line-height:1.6}
.warn{background:rgba(239,68,68,0.1);border:1px solid #ef4444;border-radius:8px;padding:12px 16px;margin-bottom:20px;color:#fca5a5;font-size:12px;line-height:1.5}
.input-wrap{margin-bottom:16px}
input[type=password]{width:100%;background:#0f172a;border:2px solid #334155;border-radius:8px;padding:14px 16px;color:#f8fafc;font-size:16px;outline:none;letter-spacing:2px;text-align:center;font-family:monospace}
input[type=password]:focus{border-color:#3b82f6}
button{width:100%;background:#3b82f6;color:#fff;border:none;border-radius:8px;padding:14px;font-size:15px;font-weight:600;cursor:pointer;transition:background 0.2s}
button:hover{background:#2563eb}
button:disabled{background:#475569;cursor:not-allowed}
#err{color:#fca5a5;font-size:13px;text-align:center;margin-top:12px;min-height:18px}
#status{color:#94a3b8;font-size:12px;text-align:center;margin-top:16px}
#content{display:none}
.logout-btn{position:fixed;top:12px;right:12px;background:#1e293b;border:1px solid #334155;color:#94a3b8;padding:6px 14px;border-radius:6px;font-size:12px;cursor:pointer;z-index:10000}
.logout-btn:hover{color:#f8fafc;background:#334155}
</style></head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="lock-icon">🔒</div>
    <h1>邓栩+宋岑娣 案 报告</h1>
    <div class="subtitle">需要密码访问 · 仅供律师团队内部参考</div>
    <div class="warn"><strong>⚠ 保密提示:</strong> 本页面包含真实姓名、身份证号、银行账号等敏感信息,严禁外泄。</div>
    <div class="input-wrap"><input type="password" id="pwd" placeholder="请输入访问密码" autofocus autocomplete="off" maxlength="20"></div>
    <button id="submit" onclick="unlock()">解锁查看</button>
    <div id="err"></div>
    <div id="status">AES-256-GCM 加密 · 客户端解密 · 不存储</div>
  </div>
</div>

<div id="content"></div>

const SALT = "beJdr/Pv3Vj3auCi2gq6Jw==";
const NONCE = "+Wpy/woouCg+bPj1";
const ITER = 200000;

function b64ToBytes(b64){return Uint8Array.from(atob(b64), c=>c.charCodeAt(0));}

async function deriveKey(password){
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey(
    'raw', enc.encode(password),
    {name:'PBKDF2'}, false, ['deriveKey']
  );
  return crypto.subtle.deriveKey(
    {name:'PBKDF2', salt:b64ToBytes(SALT), iterations:ITER, hash:'SHA-256'},
    keyMaterial,
    {name:'AES-GCM', length:256},
    false, ['decrypt']
  );
}

async function unlock(){
  const pwd = document.getElementById('pwd').value;
  const errDiv = document.getElementById('err');
  const submitBtn = document.getElementById('submit');
  errDiv.textContent = '';
  if(!pwd){errDiv.textContent = '请输入密码'; return;}
  submitBtn.disabled = true; submitBtn.textContent = '解密中...';
  
  try {
    const key = await deriveKey(pwd);
    const decrypted = await crypto.subtle.decrypt(
      {name:'AES-GCM', iv:b64ToBytes(NONCE)},
      key,
      b64ToBytes(ENC)
    );
    const text = new TextDecoder().decode(decrypted);
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('content').style.display = 'block';
    document.getElementById('content').innerHTML = text;
    sessionStorage.setItem('unlocked', '1');
    
    // 添加登出按钮
    const logoutBtn = document.createElement('button');
    logoutBtn.className = 'logout-btn';
    logoutBtn.textContent = '🔒 退出';
    logoutBtn.onclick = () => {sessionStorage.removeItem('unlocked'); location.reload();};
    document.body.appendChild(logoutBtn);
    
    // 执行嵌入的 D3 脚本
    const scripts = document.getElementById('content').querySelectorAll('script');
    scripts.forEach(oldScript => {
      const newScript = document.createElement('script');
      if(oldScript.src) {newScript.src = oldScript.src;}
      else {newScript.textContent = oldScript.textContent;}
      document.body.appendChild(newScript);
    });
  } catch(e) {
    errDiv.textContent = '密码错误,请重试';
    submitBtn.disabled = false; submitBtn.textContent = '解锁查看';
    document.getElementById('pwd').value = '';
    document.getElementById('pwd').focus();
  }
}

document.getElementById('pwd').addEventListener('keypress', e => {
  if(e.key === 'Enter') unlock();
});
</script>
