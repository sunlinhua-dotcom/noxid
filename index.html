<style>
body{font-family:'Inter','PingFang SC','Microsoft YaHei',sans-serif;}
.font-num{font-variant-numeric:tabular-nums;}
.font-serif-cn{font-family:'Noto Serif SC',serif;}
.glass{backdrop-filter:blur(12px);background:rgba(15,23,42,0.7);}
.gradient-text-red{background:linear-gradient(135deg,#ef4444 0%,#f59e0b 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.bg-grid{background-image:linear-gradient(rgba(148,163,184,0.05) 1px,transparent 1px),linear-gradient(90deg,rgba(148,163,184,0.05) 1px,transparent 1px);background-size:24px 24px;}
.glow-red{box-shadow:0 0 40px rgba(239,68,68,0.3);}
.glow-amber{box-shadow:0 0 40px rgba(245,158,11,0.25);}
.scrollbar-thin::-webkit-scrollbar{height:6px;width:6px;}
.scrollbar-thin::-webkit-scrollbar-thumb{background:#475569;border-radius:3px;}
.section-anchor{scroll-margin-top:80px;}
.law-citation{font-family:'Noto Serif SC',serif;background:rgba(245,158,11,0.08);border-left:3px solid #f59e0b;padding:10px 14px;border-radius:4px;font-size:13px;line-height:1.7;color:#fde68a;}
.evidence-tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;}
.callout{padding:16px 20px;border-radius:12px;border-left-width:4px;margin-bottom:16px;}
nav a.active{color:#f8fafc !important;background:rgba(239,68,68,0.15);border-color:#ef4444 !important;}
@keyframes slideUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.animate-slide-up{animation:slideUp 0.5s ease-out;}
@media print{body{background:white;color:#000}nav{display:none}.glass{background:white;backdrop-filter:none}}
</style>

<style>
.login-screen{position:fixed;inset:0;background:linear-gradient(135deg,#1e293b 0%,#0f172a 100%);display:flex;align-items:center;justify-content:center;z-index:9999;font-family:'Inter','PingFang SC','Microsoft YaHei',sans-serif}
.login-box{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:40px 48px;max-width:440px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.5);color:#e2e8f0}
.login-box .lock-icon{width:72px;height:72px;background:linear-gradient(135deg,#dc2626,#991b1b);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:32px;box-shadow:0 8px 24px rgba(220,38,38,0.4)}
.login-box h1{color:#f8fafc;font-size:24px;font-weight:700;text-align:center;margin-bottom:8px}
.login-box .subtitle{color:#94a3b8;font-size:13px;text-align:center;margin-bottom:24px;line-height:1.6}
.login-box .warn{background:rgba(239,68,68,0.1);border:1px solid #ef4444;border-radius:8px;padding:12px 16px;margin-bottom:20px;color:#fca5a5;font-size:12px;line-height:1.5}
.login-box input[type=password]{width:100%;background:#0f172a;border:2px solid #334155;border-radius:8px;padding:14px 16px;color:#f8fafc;font-size:18px;outline:none;letter-spacing:4px;text-align:center;font-family:'JetBrains Mono',monospace;font-weight:600}
.login-box input[type=password]:focus{border-color:#3b82f6}
.login-box .btn{width:100%;background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff;border:none;border-radius:8px;padding:14px;font-size:15px;font-weight:600;cursor:pointer;margin-top:14px;transition:all 0.2s;letter-spacing:1px}
.login-box .btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(59,130,246,0.4)}
.login-box .btn:disabled{background:#475569;cursor:not-allowed;transform:none}
.login-box .err{color:#fca5a5;font-size:13px;text-align:center;margin-top:12px;min-height:18px}
.login-box .status{color:#64748b;font-size:11px;text-align:center;margin-top:16px}
.logout-btn{position:fixed;top:16px;right:16px;background:rgba(15,23,42,0.95);backdrop-filter:blur(10px);border:1px solid #334155;color:#94a3b8;padding:8px 16px;border-radius:8px;font-size:13px;cursor:pointer;z-index:10000;font-weight:500;transition:all 0.2s;display:flex;align-items:center;gap:6px;font-family:'Inter',sans-serif}
.logout-btn:hover{color:#f8fafc;background:rgba(30,41,59,0.95)}
body{background:#020617;color:#f1f5f9;margin:0;padding:0;}
</style>

const b64=b=>Uint8Array.from(atob(b),c=>c.charCodeAt(0));

async function deriveKey(pwd){
  const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pwd),{name:'PBKDF2'},false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(SALT),iterations:ITER,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
}

async function unlock(){
  const pwd=document.getElementById('pwd').value;
  const errDiv=document.getElementById('err'),btn=document.getElementById('submit');
  errDiv.textContent='';
  if(!pwd){errDiv.textContent='请输入密码';return;}
  btn.disabled=true;btn.textContent='解密中...';
  try{
    const key=await deriveKey(pwd);
    const dec=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(NONCE)},key,b64(ENC));
    const text=new TextDecoder().decode(dec);
    document.getElementById('login-screen').style.display='none';
    const c=document.getElementById('content');
    c.style.display='block';
    c.innerHTML=text;
    
    const logoutBtn=document.createElement('button');
    logoutBtn.className='logout-btn';
    logoutBtn.textContent='🔒 退出';
    logoutBtn.onclick=()=>{location.reload();};
    document.body.appendChild(logoutBtn);
    
    // Re-execute scripts in content. Wait for layout before initializing graphs.
    setTimeout(() => {
      c.querySelectorAll('script').forEach(old=>{
        const ns=document.createElement('script');
        if(old.src){ns.src=old.src;}else{ns.textContent=old.textContent;}
        document.body.appendChild(ns);
      });
    }, 100);
    
  }catch(e){
    console.error(e);
    errDiv.textContent='密码错误,请重试';
    btn.disabled=false;btn.textContent='解锁查看';
    document.getElementById('pwd').value='';
    document.getElementById('pwd').focus();
  }
}

document.getElementById('pwd').addEventListener('keypress',e=>{if(e.key==='Enter')unlock();});
