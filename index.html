<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>邓栩+宋岑娣 案 · 登录</title>

<style>
.login-screen{position:fixed;inset:0;background:linear-gradient(135deg,#1e293b 0%,#0f172a 100%);display:flex;align-items:center;justify-content:center;z-index:9999;font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif}
.login-box{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:40px 48px;max-width:420px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.5);color:#e2e8f0}
.login-box .lock-icon{width:64px;height:64px;background:#dc2626;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:30px}
.login-box h1{color:#f8fafc;font-size:22px;font-weight:700;text-align:center;margin-bottom:8px}
.login-box .subtitle{color:#94a3b8;font-size:13px;text-align:center;margin-bottom:32px;line-height:1.6}
.login-box .warn{background:rgba(239,68,68,0.1);border:1px solid #ef4444;border-radius:8px;padding:12px 16px;margin-bottom:20px;color:#fca5a5;font-size:12px;line-height:1.5}
.login-box .input-wrap{margin-bottom:16px}
.login-box input[type=password]{width:100%;background:#0f172a;border:2px solid #334155;border-radius:8px;padding:14px 16px;color:#f8fafc;font-size:16px;outline:none;letter-spacing:2px;text-align:center;font-family:monospace}
.login-box input[type=password]:focus{border-color:#3b82f6}
.login-box button{width:100%;background:#3b82f6;color:#fff;border:none;border-radius:8px;padding:14px;font-size:15px;font-weight:600;cursor:pointer;transition:background 0.2s}
.login-box button:hover{background:#2563eb}
.login-box button:disabled{background:#475569;cursor:not-allowed}
.login-box .err{color:#fca5a5;font-size:13px;text-align:center;margin-top:12px;min-height:18px}
.login-box .status{color:#94a3b8;font-size:12px;text-align:center;margin-top:16px}
.logout-btn{position:fixed;top:12px;right:12px;background:#1e293b;border:1px solid #334155;color:#94a3b8;padding:6px 14px;border-radius:6px;font-size:12px;cursor:pointer;z-index:10000;font-family:-apple-system,"PingFang SC",sans-serif}
.logout-btn:hover{color:#f8fafc;background:#334155}
body{margin:0;padding:0;background:#0f172a}
</style>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#0f172a;color:#e2e8f0;line-height:1.6}
.header{background:linear-gradient(135deg,#1e293b 0%,#0f172a 100%);border-bottom:2px solid #ef4444;padding:32px 40px}
.header h1{font-size:28px;font-weight:700;color:#f8fafc}
.header .subtitle{color:#94a3b8;font-size:14px;margin-top:8px}
.header .meta{display:flex;gap:18px;margin-top:16px;flex-wrap:wrap}
.header .meta-item{background:#1e293b;border:1px solid #334155;border-radius:8px;padding:12px 18px;min-width:140px}
.header .meta-label{font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:1px}
.header .meta-value{font-size:22px;font-weight:700;color:#ef4444}
.header .meta-value.blue{color:#3b82f6}.header .meta-value.green{color:#22c55e}.header .meta-value.orange{color:#f59e0b}.header .meta-value.purple{color:#a855f7}
nav{background:#1e293b;border-bottom:1px solid #334155;padding:0 40px;position:sticky;top:0;z-index:100;white-space:nowrap;overflow-x:auto}
nav a{display:inline-block;padding:14px 14px;color:#94a3b8;text-decoration:none;font-size:13px;font-weight:500;border-bottom:2px solid transparent;transition:all .2s}
nav a:hover,nav a.active{color:#f8fafc;border-bottom-color:#ef4444}
.container{max-width:1400px;margin:0 auto;padding:32px 40px}
.section{margin-bottom:48px}
.section-title{font-size:20px;font-weight:700;color:#f8fafc;margin-bottom:4px;display:flex;align-items:center;gap:10px}
.section-title .badge{font-size:11px;background:#ef4444;color:white;padding:2px 10px;border-radius:12px;font-weight:600}
.section-title .badge.orange{background:#f59e0b}.section-title .badge.blue{background:#3b82f6}.section-title .badge.green{background:#22c55e}.section-title .badge.purple{background:#a855f7}
.section-desc{color:#64748b;font-size:13px;margin-bottom:16px}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:#1e293b;color:#94a3b8;font-weight:600;text-align:left;padding:10px 12px;border-bottom:2px solid #334155;font-size:12px;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
tbody td{padding:8px 12px;border-bottom:1px solid #1e293b;vertical-align:top}
.money{text-align:right;font-variant-numeric:tabular-nums;font-weight:500;white-space:nowrap}
.money.red{color:#ef4444}.money.green{color:#22c55e}.money.orange{color:#f59e0b}.money.purple{color:#a855f7}
.row-red{background:rgba(239,68,68,.08)}.row-yellow{background:rgba(245,158,11,.06)}.row-blue{background:rgba(59,130,246,.06)}.row-green{background:rgba(34,197,94,.06)}.row-purple{background:rgba(168,85,247,.08)}
.row-critical{background:rgba(220,38,38,0.18);box-shadow:inset 4px 0 0 #dc2626}
.subtotal td{font-weight:700;border-top:2px solid #334155;background:#1e293b}
.grand-total td{font-weight:700;font-size:16px;border-top:3px solid #ef4444;background:#1e293b;color:#ef4444}
.tag{display:inline-block;font-size:11px;padding:1px 8px;border-radius:4px;font-weight:500}
.tag-iron{background:#991b1b;color:#fecaca}.tag-medium{background:#92400e;color:#fde68a}.tag-weak{background:#1e3a5f;color:#93c5fd}.tag-critical{background:#7f1d1d;color:#fef2f2;font-weight:700}
.tag-paid{background:#166534;color:#bbf7d0}.tag-unpaid{background:#475569;color:#cbd5e1}.tag-partial{background:#92400e;color:#fde68a}
.note{color:#94a3b8;font-size:12px;max-width:400px}
.summary-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:24px}
.card{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:16px}
.card-label{font-size:11px;color:#64748b;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px}
.card-value{font-size:20px;font-weight:700}
.card-sub{font-size:12px;color:#64748b;margin-top:4px}
.alert-box{background:rgba(239,68,68,0.08);border-left:4px solid #ef4444;padding:16px 20px;margin-bottom:16px;border-radius:6px}
.alert-box.yellow{background:rgba(245,158,11,0.08);border-left-color:#f59e0b}
.alert-box.blue{background:rgba(59,130,246,0.08);border-left-color:#3b82f6}
.alert-box.green{background:rgba(34,197,94,0.08);border-left-color:#22c55e}
.alert-box.critical{background:rgba(220,38,38,0.15);border-left-color:#dc2626;border-left-width:6px}
.alert-box .title{font-size:14px;font-weight:700;color:#fca5a5;margin-bottom:6px}
.alert-box.yellow .title{color:#fde68a}.alert-box.blue .title{color:#93c5fd}.alert-box.green .title{color:#86efac}.alert-box.critical .title{font-size:16px;color:#fef2f2}
.alert-box .body{font-size:13px;color:#cbd5e1;line-height:1.7}
.dedup-box{background:#1e293b;border-radius:10px;padding:16px;margin-bottom:16px;border:1px solid #475569}
.dedup-box .title{color:#fde68a;font-weight:600;margin-bottom:6px;font-size:13px}
.dedup-box .body{font-size:12px;color:#cbd5e1;line-height:1.6}
.match-pct{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.match-pct.full{background:#166534;color:#bbf7d0}
.match-pct.partial{background:#92400e;color:#fde68a}
.match-pct.zero{background:#991b1b;color:#fecaca}
@media print{body{background:white;color:#1e293b}nav{display:none}}
</style>
</head>

const b64=b=>Uint8Array.from(atob(b),c=>c.charCodeAt(0));

async function deriveKey(pwd){
  const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pwd),{name:'PBKDF2'},false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(SALT),iterations:ITER,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
}

async function unlock(){
  const pwd=document.getElementById('pwd').value;
  const errDiv=document.getElementById('err'),btn=document.getElementById('submit');
  errDiv.textContent='';
  if(!pwd){errDiv.textContent='请输入密码';return;}
  btn.disabled=true;btn.textContent='解密中...';
  try{
    const key=await deriveKey(pwd);
    const dec=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(NONCE)},key,b64(ENC));
    const text=new TextDecoder().decode(dec);
    document.getElementById('login-screen').style.display='none';
    const c=document.getElementById('content');
    c.style.display='block';
    c.innerHTML=text;
    
    const logoutBtn=document.createElement('button');
    logoutBtn.className='logout-btn';
    logoutBtn.textContent='🔒 退出';
    logoutBtn.onclick=()=>{sessionStorage.removeItem('unlocked');location.reload();};
    document.body.appendChild(logoutBtn);
    
    c.querySelectorAll('script').forEach(old=>{
      const ns=document.createElement('script');
      if(old.src){ns.src=old.src;}else{ns.textContent=old.textContent;}
      document.body.appendChild(ns);
    });
  }catch(e){
    errDiv.textContent='密码错误,请重试';
    btn.disabled=false;btn.textContent='解锁查看';
    document.getElementById('pwd').value='';
    document.getElementById('pwd').focus();
  }
}

document.getElementById('pwd').addEventListener('keypress',e=>{if(e.key==='Enter')unlock();});
</script>
